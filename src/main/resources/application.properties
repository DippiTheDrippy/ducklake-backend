%dev.app.mode=DEVELOPMENT MODE
%prod.app.mode=PRODUCTION MODE
app.version=1.0.0

# HTTP configuration
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=*

## Allow credentials (cookies, authorization headers, etc.) if needed
quarkus.http.cors.access-control-allow-credentials=true

# Keycloak configuration
quarkus.oidc.auth-server-url=https://test-gitlab-keycloak.app.cloud.cbh.kth.se/realms/gitlab-realm
quarkus.oidc.client-id=ducklake
quarkus.oidc.application-type=service
## Allow longer wait for keycloak
quarkus.oidc.use-blocking-dns-lookup=true
quarkus.vertx.warning-exception-time=5S
quarkus.vertx.max-event-loop-execute-time=5S

quarkus.smallrye-jwt.enabled=true

## Enabling OIDC authentication for secured endpoints
quarkus.http.auth.permission.authenticated.paths=/api/*
quarkus.http.auth.permission.authenticated.policy=authenticated

# OpenAPI configuration
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.path=/swagger-ui
quarkus.swagger-ui.always-include=true

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/goposts

## Migration configuration
quarkus.flyway.migrate-at-start=true